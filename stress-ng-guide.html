<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stress‑NG Benchmarks Guide</title>
  <style>
    :root{
      --bg:#0c1117; --panel:#111827; --card:#0f1722; --border:#1f2a3a; --accent:#60a5fa; --text:#e5edf5; --muted:#93a4b8;
      --r:14px; --rsm:12px; --shadow:0 12px 32px rgba(0,0,0,.35)
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Helvetica, Arial;
         color:var(--text); background:linear-gradient(180deg,#0c1117 0%,#0a0f15 100%)}
    a{color:var(--accent); text-decoration:none}
    .wrap{max-width:1100px;margin:0 auto;padding:28px}
    header{margin-bottom:18px}
    h1{margin:0 0 8px; font-size:clamp(24px,4vw,38px)}
    .sub{color:var(--muted); line-height:1.5}
    .toolbar{display:flex; gap:8px; margin:8px 0 14px}
    .btn{background:#152132; border:1px solid var(--border); color:var(--text); border-radius:10px; padding:9px 12px; cursor:pointer}
    .btn:hover{background:#1a2a41}
    .group, .test{background:var(--panel); border:1px solid var(--border); border-radius:var(--r); margin:12px 0; box-shadow:var(--shadow)}
    summary{list-style:none; cursor:pointer; padding:16px 18px; display:flex; gap:10px; align-items:center}
    .group > summary{font-weight:700}
    .test{background:var(--card)}
    .test > summary{padding:14px 16px}
    .id{opacity:.85; font-variant-numeric:tabular-nums}
    .point{color:#bfd5ee}
    .body{padding: 0 18px 18px}
    .kv{margin-top:10px; display:grid; grid-template-columns:1fr; gap:10px}
    @media (min-width:860px){ .kv{grid-template-columns:repeat(2,minmax(0,1fr))} }
    .cell{border:1px dashed var(--border); border-radius:var(--rsm); padding:12px}
    .cell h4{margin:0 0 6px; font-size:12px; letter-spacing:.4px; text-transform:uppercase; color:#9fb2c9}
    .cell p, .cell ul{margin:0; line-height:1.55}
    .count{margin-left:auto; background:#122038; border:1px solid #23364e; color:#a8c1da; border-radius:999px; padding:2px 8px; font-size:12px}
    .panel{background:var(--panel); border:1px solid var(--border); border-radius:var(--r); padding:16px; box-shadow:var(--shadow); margin:12px 0}
    .cards{display:grid; grid-template-columns:1fr; gap:12px}
    @media (min-width:860px){ .cards{grid-template-columns:repeat(2,minmax(0,1fr))} }
  </style>
</head>

    function cell(title, html){ return `<div class="cell"><h4>${title}</h4>${html}</div>`; }
    function cellP(title, text){ return cell(title, `<p>${text}</p>`); }
    function cellUL(title, arr){ return cell(title, `<ul>${arr.map(x=>`<li>${x}</li>`).join('')}</ul>`); }
    function renderGroups(withPerGroupHW=false){
      const container = document.getElementById('container');
      container.innerHTML = '';
      GROUPS.forEach(g => {
        const group = document.createElement('details');
        group.className = 'group';
        const s = document.createElement('summary');
        s.innerHTML = `${g.title} <span class="count">${g.items.length} tests</span>`;
        group.appendChild(s);
        const body = document.createElement('div');
        body.className = 'body';
        if (withPerGroupHW){
          const hwBox = document.createElement('div');
          hwBox.className = 'panel';
          hwBox.innerHTML = cellUL('하드웨어 민감도', HW[g.id]);
          body.appendChild(hwBox);
        }
        g.items.forEach(id => {
          const x = T[id];
          const test = document.createElement('details');
          test.className = 'test';
          const st = document.createElement('summary');
          st.innerHTML = `<span class="id">#${id}</span> <strong>${x.n}</strong> <span class="point">— ${x.p}</span>`;
          const inner = document.createElement('div');
          inner.className = 'body';
          inner.innerHTML = `<div class="kv">
              ${cellP('CPU·가속 특징', x.a)}
              ${cellP('상세 설명', x.d)}
              ${cellP('대표 사용처', x.u)}
              ${cellP('비교 팁', x.t)}
            </div>`;
          test.append(st, inner);
          body.appendChild(test);
        });
        group.appendChild(body);
        container.appendChild(group);
      });
    }
    function renderTopHW(){
      const top = document.getElementById('top-extra');
      top.innerHTML = '';
      const panel = document.createElement('div');
      panel.className = 'panel';
      const title = document.createElement('div');
      title.className = 'sub'; title.style.fontWeight = '700';
      title.textContent = '그룹별 하드웨어 민감도 요약';
      panel.appendChild(title);
      const cards = document.createElement('div');
      cards.className = 'cards';
      GROUPS.forEach(g=>{
        const card = document.createElement('div');
        card.className = 'cell';
        card.innerHTML = `<h4>${g.title}</h4><ul>${HW[g.id].map(x=>`<li>${x}</li>`).join('')}</ul>`;
        cards.appendChild(card);
      });
      panel.appendChild(cards);
      top.appendChild(panel);
    }
    document.getElementById('expandAll').addEventListener('click', ()=>{
      document.querySelectorAll('details').forEach(d=> d.open = true);
    });
    document.getElementById('collapseAll').addEventListener('click', ()=>{
      document.querySelectorAll('details.test').forEach(d=> d.open = false);
      document.querySelectorAll('details.group').forEach(d=> d.open = false);
    });
  </script>
<script>
  renderGroups(true);
</script>
</body></html>
